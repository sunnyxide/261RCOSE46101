version: "3.9"

# Docker compose for Mac Mini lab.
# Networking: services exposed only on localhost; access externally via Tailscale.

services:
  neo4j:
    image: neo4j:5.20-community
    container_name: orbt-neo4j
    restart: unless-stopped
    ports:
      - "127.0.0.1:7474:7474"   # browser UI
      - "127.0.0.1:7687:7687"   # bolt
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc","graph-data-science"]
      - NEO4J_dbms_memory_heap_max__size=8G
      - NEO4J_dbms_memory_pagecache_size=4G
    volumes:
      - ../data/neo4j/data:/data
      - ../data/neo4j/logs:/logs
      - ../data/neo4j/import:/var/lib/neo4j/import

  lightrag:
    image: hkuds/lightrag-server:latest
    container_name: orbt-lightrag
    restart: unless-stopped
    depends_on: [neo4j]
    ports:
      - "127.0.0.1:9621:9621"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - LLM_BINDING=openai
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - EMBEDDING_BINDING=ollama
      - EMBEDDING_MODEL=bge-m3
    volumes:
      - ../data/lightrag:/app/data

  # Lightweight orchestrator dashboard (Streamlit)
  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    container_name: orbt-dashboard
    restart: unless-stopped
    ports:
      - "127.0.0.1:8501:8501"
    volumes:
      - ..:/app:ro
    environment:
      - PYTHONUNBUFFERED=1

  # Slack bot for human-in-loop approvals
  slackbot:
    build:
      context: ..
      dockerfile: docker/Dockerfile.slackbot
    container_name: orbt-slackbot
    restart: unless-stopped
    environment:
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN}
    volumes:
      - ..:/app:ro

# Notes:
# - The agent processes themselves run on the host (not in containers) so they
#   can use MLX/Metal natively. Containers are only for stateful services.
# - All data volumes are bind-mounted to ../data/ so they're DVC-trackable.
# - OASIS sims run as host Python processes managed by orchestrator.scheduler.
